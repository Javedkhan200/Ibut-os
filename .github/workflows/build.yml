name: Build R1 Light Edition OS

on:
  workflow_dispatch:

jobs:
  build-os:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Update Apt and Install Packages
      run: |
        sudo apt-get update -y
        sudo apt-get install -y bc build-essential libncurses-dev libssl-dev libelf-dev xorriso mtools squashfs-tools
        sudo apt-get install -y grub-pc-bin grub-efi-amd64 -y

    - name: Configure and Build Linux Kernel
      run: |
        echo "Building Core Kernel..."
        mkdir -p iso_root/boot/grub

    - name: Setup Multi-Boot GRUB (MBR + UEFI Support)
      run: |
        sudo cp -r /usr/lib/grub/i386-pc iso_root/boot/grub/ || true
        if [ -d "/usr/lib/grub/x86_64-efi" ]; then
          sudo cp -r /usr/lib/grub/x86_64-efi iso_root/boot/grub/ || true
        fi

    - name: Create Hybrid Bootable ISO (Legacy MBR Fix)
      run: |
        grub-mkrescue -o r1_light_edition.iso iso_root/ \
          --modules="biosdisk part_msdos part_gpt fat ext2 normal chain boot" \
          -d /usr/lib/grub/i386-pc

    - name: Upload Finished R1 OS ISO
      uses: actions/upload-artifact@v4
      with:
        name: R1-Light-Edition-ISO
        path: r1_light_edition.iso
