name: Build R1 Light Edition OS

on:
  workflow_dispatch:

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'false'

jobs:
  build-os:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Install System Compilers and Tools
      run: |
        sudo apt-get update -y
        sudo apt-get install -y bc build-essential libncurses-dev libssl-dev libelf-dev xorriso mtools squashfs-tools genisoimage wget curl git
        sudo apt-get install -y grub-pc-bin grub-efi-amd64 -y

    - name: All-In-One Sudo Ibut OS Core Build
      run: |
        echo "=================================================="
        echo "   IBUT OS R1 LIGHT EDITION (ZORIN LOOK BUILD)    "
        echo "=================================================="
        
        # 1. Directories बनाना
        mkdir -p iso_root/boot/grub
        mkdir -p iso_root/live
        mkdir -p iso_root/apps
        mkdir -p iso_root/system/gui
        
        # 2. Kernel Setup
        echo "Downloading the absolute real kernel package..."
        KERNEL_PKG=$(apt-cache search linux-image-[0-9] | grep generic | head -n 1 | awk '{print $1}')
        sudo apt-get download $KERNEL_PKG -y
        mkdir -p kernel_tmp
        sudo dpkg-deb -x linux-image-*.deb kernel_tmp/
        sudo cp kernel_tmp/boot/vmlinuz-* iso_root/boot/vmlinuz
        sudo rm -rf kernel_tmp *.deb
        
        # 3. Brave Browser Inject करना
        echo "Downloading Brave Browser..."
        sudo curl -L -o iso_root/apps/brave.appimage "https://github.com/Alex313031/Brave-AppImage/releases/download/v1.66.118-1/Brave_Browser-x86_64.AppImage" || true
        sudo chmod +x iso_root/apps/brave.appimage || true
        
        # 4. Zorin OS Like Premium Look & Golden Logo Config
        sudo chmod -R 777 iso_root/
        echo "INTERFACE_LANG=EN_US" > iso_root/system/gui/theme.cfg
        echo "THEME_STYLE=ZORIN_PREMIUM_DARK_MODERN" >> iso_root/system/gui/theme.cfg
        echo "TASKBAR_LAYOUT=ZORIN_WINDOWS_STYLE" >> iso_root/system/gui/theme.cfg
        echo "IBUT_CORE_LOGO=WING_AND_EYE_GOLDEN" >> iso_root/system/gui/theme.cfg
        
        cat <<EOF > iso_root/system/gui/desktop.desktop
        [Desktop Entry]
        Name=Ibut OS Desktop
        Language=English
        UI_Style=Zorin_OS_Inspired
        UI_Mode=Premium_Dark_Layout
        ShowLogo=true
        EOF
        
        # 5. GRUB Boot Files Setup
        sudo cp -r /usr/lib/grub/i386-pc iso_root/boot/grub/ || true
        
        sudo cat <<EOF > iso_root/boot/grub/grub.cfg
        set timeout=5
        set default=0
        menuentry "Launch IBUT OS R1 (Zorin OS English Dark GUI)" {
            linux /boot/vmlinuz boot=live quiet splash
            initrd /live/filesystem.squashfs
        }
        EOF

    - name: Download Real Live Desktop Files (1.3GB+ Size Fix)
      run: |
        echo "Downloading Real Base OS SquashFS System..."
        # अब हम नकली डेटा नहीं, बल्कि असली 1.2 GB+ का लाइव कोर फाइल सिस्टम सीधा रिपॉजिटरी से डाउनलोड करके अंदर डाल रहे हैं
        sudo wget -q https://releases.ubuntu.com/24.04/ubuntu-24.04-desktop-amd64.iso -O ubuntu.iso
        mkdir -p mount_iso
        sudo mount -o loop ubuntu.iso mount_iso
        # असली भारी-भरकम सिस्टम फाइल को हमारे Ibut OS में कॉपी करना
        sudo cp mount_iso/casper/filesystem.squashfs iso_root/live/filesystem.squashfs
        sudo umount mount_iso
        sudo rm -rf ubuntu.iso mount_iso
        echo "Real Heavy System Core Successfully Packed!"

    - name: Create ISO using Genisoimage
      run: |
        echo "Generating Bootable ISO..."
        sudo genisoimage -R -o r1_light_edition.iso iso_root/

    - name: Upload Finished Full Ibut OS ISO
      uses: actions/upload-artifact@v4
      with:
        name: IBUT-OS-R1-PREMIUM
        path: r1_light_edition.iso
