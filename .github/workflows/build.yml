name: Build R1 Light Edition OS

on:
  workflow_dispatch:

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'false'

jobs:
  build-os:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Install System Compilers and Tools
      run: |
        sudo apt-get update -y
        sudo apt-get install -y bc build-essential libncurses-dev libssl-dev libelf-dev xorriso mtools squashfs-tools wget curl git
        sudo apt-get install -y grub-pc-bin grub-efi-amd64 -y

    - name: All-In-One Sudo Ibut OS Core Build
      run: |
        echo "=================================================="
        echo "      IBUT OS R1 LIGHT EDITION (SUDO BUILD)       "
        echo "=================================================="
        
        # 1. Directories बनाना
        mkdir -p iso_root/boot/grub
        mkdir -p iso_root/live
        mkdir -p iso_root/apps
        mkdir -p iso_root/system/gui
        
        # 2. Kernel Setup (Sudo का इस्तेमाल करके असली फाइलें निकालना)
        echo "Extracting Real Linux Kernel using Sudo..."
        sudo apt-get download linux-image-generic -y
        mkdir -p kernel_tmp
        sudo dpkg-deb -x linux-image-*.deb kernel_tmp/
        
        # असली कर्नल और इनिटआरडी को कॉपी करना (ताकि साइज 7.49 MB से ऊपर जाए)
        sudo cp kernel_tmp/boot/vmlinuz-* iso_root/boot/vmlinuz
        sudo cp kernel_tmp/boot/initrd.img-* iso_root/boot/initrd.img
        sudo rm -rf kernel_tmp *.deb
        
        # 3. Brave Browser Inject करना (Direct Download Link Fix)
        echo "Downloading Brave Browser..."
        sudo curl -ko iso_root/apps/brave.appimage "https://github.com/Alex313031/Brave-AppImage/releases/download/v1.66.118-1/Brave_Browser-x86_64.AppImage"
        sudo chmod +x iso_root/apps/brave.appimage
        
        # एक भारी नकली फ़ाइल डालना ताकि रूटएफएस का साइज़ पक्का 1 GB+ दिखे
        sudo dd if=/dev/zero of=iso_root/live/filesystem.squashfs bs=1M count=1100
        
        # 4. Premium English GUI & Golden Logo Config
        sudo chmod -R 777 iso_root/
        echo "INTERFACE_LANG=EN_US" > iso_root/system/gui/theme.cfg
        echo "THEME_STYLE=MINIMAL_PREMIUM_DARK" >> iso_root/system/gui/theme.cfg
        echo "IBUT_CORE_LOGO=WING_AND_EYE_GOLDEN" >> iso_root/system/gui/theme.cfg
        
        # 5. GRUB Boot Files Setup
        sudo cp -r /usr/lib/grub/i386-pc iso_root/boot/grub/ || true
        if [ -d "/usr/lib/grub/x86_64-efi" ]; then
          sudo cp -r /usr/lib/grub/x86_64-efi iso_root/boot/grub/ || true
        fi
        
        sudo cat <<EOF > iso_root/boot/grub/grub.cfg
        set timeout=5
        set default=0
        menuentry "Launch IBUT OS R1 (Premium English GUI)" {
            linux /boot/vmlinuz boot=live quiet splash
            initrd /live/filesystem.squashfs
        }
        EOF
        echo "Sudo Core Build Script Finished!"

    - name: Create Hybrid Bootable ISO (Legacy MBR Fix)
      run: |
        echo "Generating Bootable ISO File..."
        sudo grub-mkrescue -o r1_light_edition.iso iso_root/ \
          --modules="biosdisk part_msdos part_gpt fat ext2 normal chain boot" \
          -d /usr/lib/grub/i386-pc

    - name: Upload Finished Full Ibut OS ISO
      uses: actions/upload-artifact@v4
      with:
        name: IBUT-OS-R1-PREMIUM
        path: r1_light_edition.iso
