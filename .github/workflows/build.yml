name: Compile Ibut OS ISO
on: [push]
jobs:
  build_iso:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up Linux Live Kit Dependencies
        run: |
          sudo apt update
          sudo apt install -y xorriso squashfs-tools wget debootstrap cpio

      - name: Build Professional Hybrid OS Structures
        run: |
          chmod +x build_ibut_os.sh
          sudo ./build_ibut_os.sh

      - name: Upload Finished ISO File
        uses: actions/upload-artifact@v4
        with:
          name: Ibut_OS_Core_R1_ISO
          path: /tmp/Ibut_OS_Core_R1.iso
